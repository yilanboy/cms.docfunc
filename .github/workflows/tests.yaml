name: Run Tests

on:
  workflow_dispatch:
    inputs:
      name:
        description: Who to greet
        default: Allen
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  tests:
    name: Test in php ${{ matrix.php }} version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php:
          - 8.4
          - 8.5
    env:
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      BROADCAST_DRIVER: log
      CACHE_STORE: redis
      FILESYSTEM_DISK: s3
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: hello@example.com
      AUTH_MODEL: App\Models\Admin
      ADMIN_NAME: Admin
      ADMIN_EMAIL: example@email.com
      ADMIN_PASSWORD: Password101

    services:
      redis:
        image: redis
        ports:
          - 6379/tcp
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Docs: https://github.com/shivammathur/setup-php
      - name: Setup php
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # https://laravel.com/docs/9.x/deployment#server-requirements
          extensions: redis
          coverage: xdebug

      - name: Setup node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Get composer cache directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Generate vite manifest
        run: |
          pnpm install
          pnpm run build

      - name: Prepare the application
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate

      - name: Run the static analysis
        run: vendor/bin/phpstan analyse --memory-limit=2G

      - name: Run Laravel pint
        run: vendor/bin/pint --test

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache playwright binaries
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright's dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Test with pest
        run: vendor/bin/pest --parallel --coverage-clover ./coverage.xml
        env:
          REDIS_PORT: ${{ job.services.redis.ports['6379'] }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: yilanboy/cms.docfunc

      - name: Send test status to Telegram
        if: always()
        run: |
          curl -G -s -o /dev/null "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage?" \
            --data-urlencode "text=DocFunc PHP ${{ matrix.php }} tests ${{ job.status }}: ${{ github.workflow }} - ${{ github.run_number }}" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"
